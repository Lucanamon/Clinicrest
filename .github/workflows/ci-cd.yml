name: clinicrest-ci-cd

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend dependencies
        run: dotnet restore apps/api/api.csproj

      - name: Build backend
        run: dotnet build apps/api/api.csproj --configuration Release --no-restore

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm install

      - name: Build frontend
        working-directory: apps/web
        run: npm run build -- --configuration production --output-mode static

  docker-images:
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: vars
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t clinicrest-api:${{ steps.vars.outputs.sha_short }} \
            -t clinicrest-api:latest \
            .

      - name: Build WEB image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            -t clinicrest-web:${{ steps.vars.outputs.sha_short }} \
            -t clinicrest-web:latest \
            .

      - name: Login to Docker Hub (optional)
        if: github.ref == 'refs/heads/master' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push API image (optional)
        if: github.ref == 'refs/heads/master' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        run: |
          docker tag clinicrest-api:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/clinicrest-api:${{ steps.vars.outputs.sha_short }}
          docker tag clinicrest-api:latest ${{ secrets.DOCKERHUB_USERNAME }}/clinicrest-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/clinicrest-api:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/clinicrest-api:latest

      - name: Push WEB image (optional)
        if: github.ref == 'refs/heads/master' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        run: |
          docker tag clinicrest-web:${{ steps.vars.outputs.sha_short }} ${{ secrets.DOCKERHUB_USERNAME }}/clinicrest-web:${{ steps.vars.outputs.sha_short }}
          docker tag clinicrest-web:latest ${{ secrets.DOCKERHUB_USERNAME }}/clinicrest-web:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/clinicrest-web:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/clinicrest-web:latest
