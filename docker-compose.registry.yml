# Use pre-built images from Docker Hub (after CI push).
# Usage:
#   export DOCKERHUB_USERNAME=youruser
#   export IMAGE_TAG=latest   # or a git SHA tag from CI
#   docker compose -f docker-compose.registry.yml up -d
#
# Set JWT_SECRET, POSTGRES_PASSWORD, etc. via `.env` (see .env.example).

services:
  db:
    image: postgres:16-alpine
    container_name: miniflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-miniflowdb}
      POSTGRES_USER: ${POSTGRES_USER:-miniflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-miniflowpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miniflow} -d ${POSTGRES_DB:-miniflowdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend

  api:
    image: ${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/clinicrest-api:${IMAGE_TAG:-latest}
    container_name: clinicrest-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-clinicrest};Username=${POSTGRES_USER:-miniflow};Password=${POSTGRES_PASSWORD:miniflowpass}
      Jwt__Issuer: ${JWT_ISSUER:-clinicrest-api}
      Jwt__Audience: ${JWT_AUDIENCE:-clinicrest-web}
      Jwt__Secret: ${JWT_SECRET:-change-me-set-JWT_SECRET-in-production-min-32-chars}
      Seed__SyncRootAdminPasswordOnStartup: "false"
      Seed__ResetRootAdminIfPasswordMismatch: "false"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - backend
      - edge
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    image: ${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/clinicrest-web:${IMAGE_TAG:-latest}
    container_name: clinicrest-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - edge
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
  edge:
    driver: bridge
