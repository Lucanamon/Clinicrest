<div class="form-shell">
  <header class="form-header">
    <div>
      <h1>New patient</h1>
      <p>Add a new patient record.</p>
    </div>
    <a routerLink="/patients" class="back-link">← Back to list</a>
  </header>

  @if (saveError()) {
    <section class="state-card error">{{ saveError() }}</section>
  }

  <form class="patient-form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field-grid">
      <label class="field">
        <span>First name *</span>
        <input type="text" formControlName="firstName" autocomplete="given-name" />
        @if (form.controls.firstName.touched && form.controls.firstName.invalid) {
          <span class="field-error">Required</span>
        }
      </label>

      <label class="field">
        <span>Last name *</span>
        <input type="text" formControlName="lastName" autocomplete="family-name" />
        @if (form.controls.lastName.touched && form.controls.lastName.invalid) {
          <span class="field-error">Required</span>
        }
      </label>

      <label class="field">
        <span>Date of birth *</span>
        <input type="date" formControlName="dateOfBirth" [max]="maxDateOfBirth" />
        @if (form.controls.dateOfBirth.touched && form.controls.dateOfBirth.invalid) {
          <span class="field-error">{{ getDateOfBirthError(form.controls.dateOfBirth) }}</span>
        }
      </label>

      <label class="field">
        <span>Gender *</span>
        <input type="text" formControlName="gender" autocomplete="sex" placeholder="e.g. Female" />
        @if (form.controls.gender.touched && form.controls.gender.invalid) {
          <span class="field-error">Required</span>
        }
      </label>

      <label class="field field-span">
        <span>Phone number *</span>
        <input
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          formControlName="phoneNumber"
          autocomplete="tel"
          (input)="onPhoneInput()"
        />
        @if (form.controls.phoneNumber.touched && form.controls.phoneNumber.invalid) {
          <span class="field-error">{{ getPhoneError(form.controls.phoneNumber) }}</span>
        }
      </label>

      <label class="field field-span">
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" placeholder="Optional" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="field-error">Enter a valid email address</span>
        }
      </label>

      <label class="field">
        <span>
          <input type="checkbox" formControlName="allowSms" />
          Receive SMS reminders
        </span>
      </label>

      <label class="field">
        <span>
          <input type="checkbox" formControlName="allowEmail" />
          Receive Email reminders
        </span>
      </label>

      <label class="field field-span">
        <span>Underlying disease</span>
        <textarea
          formControlName="underlyingDisease"
          rows="3"
          placeholder="Optional"
        ></textarea>
        @if (form.controls.underlyingDisease.touched && form.controls.underlyingDisease.invalid) {
          <span class="field-error">Max 1000 characters</span>
        }
      </label>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="form.invalid || isSubmitting()">
        {{ isSubmitting() ? 'Saving...' : 'Create patient' }}
      </button>
    </div>
  </form>
</div>
