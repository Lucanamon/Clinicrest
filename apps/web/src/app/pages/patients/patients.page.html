<main class="patients-shell">
  <header class="patients-header">
    <div>
      <h1>Patients</h1>
      <p>Overview of registered patients</p>
    </div>

    <div class="header-metrics">
      <span class="metric-pill">{{ totalPatients() }} total</span>
      <button type="button" class="action-btn">+ New Patient</button>
    </div>
  </header>

  @if (loading()) {
    <section class="state-card">Loading patients...</section>
  } @else if (error()) {
    <section class="state-card error">{{ error() }}</section>
  } @else {
    <section class="table-card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Phone</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let patient of patients()">
            <td class="patient-name">{{ patient.name }}</td>
            <td>{{ patient.age }}</td>
            <td>{{ patient.phone }}</td>
            <td>
              <span class="status-badge" [class.critical]="getStatus(patient) === 'critical'">
                {{ getStatusLabel(patient) }}
              </span>
            </td>
          </tr>
          <tr *ngIf="patients().length === 0">
            <td colspan="4" class="empty-state">No patients found.</td>
          </tr>
        </tbody>
      </table>
    </section>
  }
</main>
