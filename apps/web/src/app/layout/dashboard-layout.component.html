<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <div>
        <h1>Clinicrest</h1>
        <p>Clinical Dashboard</p>
      </div>
    </div>

    @if (isGuest) {
      <p class="guest-mode-note">Guest mode</p>
    } @else {
      <nav class="nav-links" aria-label="Main navigation">
        <a routerLink="/patients" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <span class="nav-label">Patients</span>
        </a>
        <a routerLink="/appointments" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <span class="nav-label">Appointments</span>
        </a>
        <a routerLink="/schedule" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <span class="material-symbols-outlined nav-icon" aria-hidden="true">calendar_today</span>
          <span class="nav-label">Schedule</span>
        </a>
        @if (canAccessBooking) {
          <a routerLink="/booking" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            <span class="nav-label">Booking</span>
          </a>
        }
        <a routerLink="/backlog" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <span class="nav-label">Backlog</span>
        </a>
        @if (auth.isRootAdmin()) {
          <a routerLink="/users" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            <span class="nav-label">Users</span>
          </a>
          <a routerLink="/audit-logs" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            <span class="nav-label">Audit log</span>
          </a>
        }
      </nav>
    }
  </aside>

  <div class="main-panel">
    <header class="topbar">
      @if (isGuest) {
        <div class="guest-mode-banner">Guest mode</div>
      } @else {
        <app-global-search />

        <div class="topbar-actions">
          <button class="user-pill" type="button" (click)="goToProfile()">
            <img
              class="avatar-image"
              [src]="avatarUrl()"
              (error)="onImageError($event)"
              width="35"
              height="35"
              alt="User avatar"
            />
            <span class="name">{{ displayName() }}</span>
          </button>

          <button class="logout-btn" type="button" (click)="logout()">Logout</button>
        </div>
      }
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>

  @if (!isGuest) {
    <app-right-sidebar />
  }
</div>
