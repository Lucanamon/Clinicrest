<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <div>
        <h1>Clinicrest</h1>
        <p>Clinical Dashboard</p>
      </div>
    </div>

    <nav class="nav-links" aria-label="Main navigation">
      <a routerLink="/patients" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Patients
      </a>
      <a routerLink="/appointments" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Appointments
      </a>
      <a routerLink="/booking" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Booking
      </a>
      <a routerLink="/backlog" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Backlog
      </a>
      @if (auth.isRootAdmin()) {
        <a routerLink="/users" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Users
        </a>
        <a routerLink="/audit-logs" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Audit log
        </a>
      }
    </nav>
  </aside>

  <div class="main-panel">
    <header class="topbar">
      <app-global-search />

      <div class="topbar-actions">
        <button class="user-pill" type="button" (click)="goToProfile()">
          <img
            class="avatar-image"
            [src]="profileImageUrl || defaultAvatar"
            (error)="onImageError($event)"
            width="35"
            height="35"
            alt="User avatar"
          />
          <span class="name">{{ displayName }}</span>
        </button>

        <button class="logout-btn" type="button" (click)="logout()">Logout</button>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>

  <app-right-sidebar />
</div>
