services:
  db:
    image: postgres:16-alpine
    container_name: clinicrest-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinicrest}
      POSTGRES_USER: ${POSTGRES_USER:-clinicrest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinicrest} -d ${POSTGRES_DB:-clinicrest}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend
    # Expose DB port only when needed externally.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  api:
    container_name: clinicrest-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-clinicrest};Username=${POSTGRES_USER:-clinicrest};Password=${POSTGRES_PASSWORD:-change_me}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - backend
      - frontend
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    container_name: clinicrest-web
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-/api}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - frontend
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
