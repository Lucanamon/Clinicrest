# Production-oriented stack: PostgreSQL (internal), API, Angular+nginx.
# Build: docker compose build
# Run:   docker compose up -d
# Env:   copy .env.example to .env and set secrets (JWT, Postgres, etc.)

services:
  db:
    image: postgres:16-alpine
    container_name: clinicrest-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinicrest}
      POSTGRES_USER: ${POSTGRES_USER:-clinicrest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinicrest} -d ${POSTGRES_DB:-clinicrest}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend
    # Do not publish DB port to the host in production (use internal network only).
    # For local DB access, use: docker compose --profile tools up -d
    # or docker compose exec db psql -U clinicrest -d clinicrest

  api:
    container_name: clinicrest-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-clinicrest};Username=${POSTGRES_USER:-clinicrest};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER:-clinicrest-api}
      Jwt__Audience: ${JWT_AUDIENCE:-clinicrest-web}
      Jwt__Secret: ${JWT_SECRET:-change-me-set-JWT_SECRET-in-production-min-32-chars}
      # Prefer Email__Smtp__* in .env (same names the API reads). Optional fallbacks for older .env that used SMTP_*.
      Email__Smtp__Host: ${Email__Smtp__Host:-${SMTP_HOST:-smtp.gmail.com}}
      Email__Smtp__Port: ${Email__Smtp__Port:-${SMTP_PORT:-587}}
      Email__Smtp__EnableSsl: ${Email__Smtp__EnableSsl:-${SMTP_ENABLE_SSL:-true}}
      Email__Smtp__FromEmail: ${Email__Smtp__FromEmail:-${SMTP_FROM_EMAIL:-noreply@example.com}}
      Email__Smtp__FromName: ${Email__Smtp__FromName:-${SMTP_FROM_NAME:-Clinicrest Notifications}}
      Email__Smtp__Username: ${Email__Smtp__Username:-${SMTP_USERNAME:-}}
      Email__Smtp__Password: ${Email__Smtp__Password:-${SMTP_PASSWORD:-}}
      Seed__SyncRootAdminPasswordOnStartup: "false"
      Seed__ResetRootAdminIfPasswordMismatch: "false"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - backend
      - edge
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    container_name: clinicrest-web
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - edge
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
  edge:
    driver: bridge
